global:
  checkNewVersion: true      # set to false to disable
  sendAnonymousUsage: true  # set to false to disable

http:
  routers:
    authelia:
      rule: "Host(`auth.localhost`)"
      service: authelia
      entryPoints: [web, websecure]
      tls: {}
    openwebui:
      rule: "Host(`openwebui.localhost`)"
      service: openwebui
      entryPoints: [web, websecure]
      tls: {}
      middlewares: [authelia]
    langfuse:
      rule: "Host(`langfuse.localhost`)"
      service: langfuse
      entryPoints: [web, websecure]
      tls: {}
      middlewares: [authelia]
    litellm:
      rule: "Host(`litellm.localhost`)"
      service: litellm
      entryPoints: [web, websecure]
      tls: {}
      middlewares: [authelia]
    rag-api:
      rule: "Host(`rag-api.localhost`)"
      service: rag-api
      entryPoints: [web, websecure]
      tls: {}
      middlewares: [authelia]
    grafana:
      rule: "Host(`grafana.localhost`)"
      service: grafana
      entryPoints: [web, websecure]
      tls: {}
      middlewares: [authelia]
    jaeger:
      rule: "Host(`jaeger.localhost`)"
      service: jaeger
      entryPoints: [web, websecure]
      tls: {}
      middlewares: [authelia]
    zipkin:
      rule: "Host(`zipkin.localhost`)"
      service: zipkin
      entryPoints: [web, websecure]
      tls: {}
      middlewares: [authelia]
    loki:
      rule: "Host(`loki.localhost`)"
      service: loki
      entryPoints: [web, websecure]
      tls: {}
      middlewares: [authelia]
    traefik:
      rule: "Host(`traefik.localhost`)"
      service: traefik
      entryPoints: [web, websecure]
      tls: {}
      middlewares: [authelia]

  middlewares:
    authelia:
      forwardAuth:
        address: "http://authelia:9091/api/verify?rd=https://auth.localhost/"
        trustForwardHeader: true
        authResponseHeaders:
          - Remote-User
          - Remote-Groups
          - Remote-Name
          - Remote-Email

  services:
    authelia:
      loadBalancer:
        servers:
          - url: "http://authelia:9091"
    openwebui:
      loadBalancer:
        servers:
          - url: "http://openwebui:8080"
    langfuse:
      loadBalancer:
        servers:
          - url: "http://langfuse-web:3000"
    litellm:
      loadBalancer:
        servers:
          - url: "http://litellm:4000"
    rag-api:
      loadBalancer:
        servers:
          - url: "http://rag-api:8001"
    grafana:
      loadBalancer:
        servers:
          - url: "http://grafana:3000"
    jaeger:
      loadBalancer:
        servers:
          - url: "http://jaeger:16686"
    zipkin:
      loadBalancer:
        servers:
          - url: "http://zipkin:9411"
    loki:
      loadBalancer:
        servers:
          - url: "http://loki:3100"
    traefik:
      loadBalancer:
        servers:
          - url: "http://traefik:8080"