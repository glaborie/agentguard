x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "2"

x-deploy-limits: &deploy-limits
  resources:
    limits:
      cpus: "1"
      memory: 1g
    reservations:
      cpus: "0.5"
      memory: 512m

x-deploy-otel: &deploy-otel
  resources:
    limits:
      cpus: "0.5"
      memory: 256m
    reservations:
      cpus: "0.25"
      memory: 128m

x-deploy-jaeger: &deploy-jaeger
  resources:
    limits:
      cpus: "0.5"
      memory: 512m
    reservations:
      cpus: "0.25"
      memory: 256m

services:
  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    restart: always
    logging: *default-logging
    deploy: *deploy-jaeger
    pull_policy: if_not_present
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      TZ: UTC
    ports:
      - "16686:16686"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - langfuse

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    restart: always
    logging: *default-logging
    deploy: *deploy-otel
    pull_policy: if_not_present
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    environment:
      LANGFUSE_OTEL_AUTH: "${LANGFUSE_OTEL_AUTH:-Basic cGstbGYtZGV2OnNrLWxmLWRldg==}"
      TZ: UTC
    ports:
      - "4317:4317"
      - "4318:4318"
      - "8888:8888"
    depends_on:
      jaeger:
        condition: service_started
    networks:
      - langfuse

  dozzle:
    image: amir20/dozzle:v10.6.0
    restart: always
    logging: *default-logging
    deploy: *deploy-limits
    pull_policy: if_not_present
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      DOZZLE_NO_ANALYTICS: "true"
      TZ: UTC
    networks:
      - langfuse

  portainer:
    image: portainer/portainer-ce@sha256:8d2f5c9fbc5b8490fb3a12efadbad74978e22991911e1db611d8a45871775112
    restart: always
    logging: *default-logging
    deploy: *deploy-limits
    pull_policy: if_not_present
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data:/data
    environment:
      TZ: UTC
    networks:
      - langfuse

  prometheus:
    image: prom/prometheus:v2.52.0
    restart: always
    logging: *default-logging
    deploy: *deploy-otel
    pull_policy: if_not_present
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      - otel-collector
    networks:
      - langfuse

  grafana:
    image: grafana/grafana:11.1.0
    restart: always
    logging: *default-logging
    deploy: *deploy-otel
    pull_policy: if_not_present
    ports:
      - "3300:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      GF_SECURITY_ADMIN_USER: admin
      TZ: UTC
    depends_on:
      - prometheus
    networks:
      - langfuse

volumes:
  portainer_data:
  prometheus_data:
  grafana_data:

networks:
  langfuse:
    external: true
    name: langfuse_poc_langfuse
