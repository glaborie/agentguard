global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'agentguard'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']

  - job_name: 'rag-api'
    static_configs:
      - targets: ['rag-api:8001']
    metrics_path: /metrics

  - job_name: 'litellm'
    static_configs:
      - targets: ['litellm:4000']
    metrics_path: /metrics

remote_write:
  - url: "http://openobserve:5080/api/default/prometheus/api/v1/write"
    basic_auth:
      username: "${ZO_ROOT_USER_EMAIL}"
      password: "${ZO_ROOT_USER_PASSWORD}"
