global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'agentguard'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8888']

  - job_name: 'rag-api'
    static_configs:
      - targets: ['rag-api:8001']
    metrics_path: /metrics

  - job_name: 'litellm'
    static_configs:
      - targets: ['litellm:4000']
    metrics_path: /metrics

# Prometheus does not expand env vars in config — credentials are literal.
# Update here if ZO_ROOT_USER_EMAIL/ZO_ROOT_USER_PASSWORD change in .env.
remote_write:
  - url: "http://openobserve:5080/api/default/prometheus/api/v1/write"
    basic_auth:
      username: "root@example.com"
      password: "Complexpass#123"
