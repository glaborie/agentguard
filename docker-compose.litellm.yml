x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "2"

x-deploy-limits: &deploy-limits
  resources:
    limits:
      cpus: "1"
      memory: 1g
    reservations:
      cpus: "0.5"
      memory: 512m

services:
  postgres:
    image: docker.io/postgres:17-alpine
    restart: always
    logging: *default-logging
    deploy: *deploy-limits
    pull_policy: if_not_present
    env_file: .env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: litellm
    ports:
      - "127.0.0.1:5501:5432"
    volumes:
      - litellm_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d litellm"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - litellm

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    restart: always
    logging: *default-logging
    deploy: *deploy-limits
    pull_policy: if_not_present
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
      - ./guardrails/custom_guardrails.py:/app/custom_guardrails.py
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      LANGFUSE_HOST: http://localhost:3200
      TZ: Europe/Berlin
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_ADMIN_KEY: ${LITELLM_ADMIN_KEY}
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/litellm
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness', timeout=4)"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - litellm

volumes:
  litellm_postgres_data:

networks:
  litellm:
