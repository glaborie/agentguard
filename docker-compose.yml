x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "2"

x-deploy-limits: &deploy-limits
  resources:
    limits:
      cpus: "1"
      memory: 1g
    reservations:
      cpus: "0.5"
      memory: 512m

x-deploy-clickhouse: &deploy-clickhouse
  resources:
    limits:
      cpus: "2"
      memory: 2g
    reservations:
      cpus: "1"
      memory: 1g

x-deploy-postgres: &deploy-postgres
  resources:
    limits:
      cpus: "1.5"
      memory: 1g
    reservations:
      cpus: "1"
      memory: 512m

x-deploy-ollama: &deploy-ollama
  resources:
    limits:
      cpus: "4"
      memory: 6g
    reservations:
      cpus: "2"
      memory: 5g
      devices:
        - driver: nvidia
          count: all
          capabilities: [gpu]

services:
  langfuse-web:
    image: docker.io/langfuse/langfuse:3.174.1
    init: true
    restart: always
    logging: *default-logging
    deploy: *deploy-limits
    pull_policy: if_not_present
    env_file: .env
    depends_on: &langfuse-deps
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    ports:
      - "3200:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://$(hostname -i):3000/api/public/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    environment: &langfuse-env
      TZ: UTC
      LANGFUSE_LOG_LEVEL: warn
      NEXTAUTH_URL: http://localhost:3200
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
      CLICKHOUSE_MIGRATION_URL: clickhouse://${CLICKHOUSE_USER}:${CLICKHOUSE_PASSWORD}@clickhouse:9000
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: media/
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_BATCH_EXPORT_ENABLED: "false"
      LANGFUSE_USE_AZURE_BLOB: "false"
      LANGFUSE_USE_OCI_NATIVE_OBJECT_STORAGE: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_AUTH: ${REDIS_PASSWORD}
      REDIS_TLS_ENABLED: "false"
      LANGFUSE_INIT_ORG_ID: ${LANGFUSE_INIT_ORG_ID}
      LANGFUSE_INIT_ORG_NAME: ${LANGFUSE_INIT_ORG_NAME}
      LANGFUSE_INIT_PROJECT_ID: ${LANGFUSE_INIT_PROJECT_ID}
      LANGFUSE_INIT_PROJECT_NAME: ${LANGFUSE_INIT_PROJECT_NAME}
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL}
      LANGFUSE_INIT_USER_NAME: ${LANGFUSE_INIT_USER_NAME}
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD}
    networks:
      - langfuse

  langfuse-worker:
    image: docker.io/langfuse/langfuse-worker:3.174.1
    init: true
    restart: always
    logging: *default-logging
    deploy: *deploy-limits
    pull_policy: if_not_present
    env_file: .env
    depends_on: *langfuse-deps
    environment:
      <<: *langfuse-env
      LOG_LEVEL: warn
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://$(hostname -i):3030/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - langfuse

  postgres:
    image: docker.io/postgres:17-alpine
    init: true
    restart: always
    logging: *default-logging
    deploy: *deploy-postgres
    pull_policy: if_not_present
    command: >
      postgres
      -c tcp_keepalives_idle=60
      -c tcp_keepalives_interval=10
      -c tcp_keepalives_count=5
      -c idle_in_transaction_session_timeout=30000
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    env_file: .env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
      TZ: UTC
      PGTZ: UTC
    ports:
      - "127.0.0.1:5500:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - langfuse

  clickhouse:
    image: docker.io/clickhouse/clickhouse-server:26.4
    init: true
    restart: always
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4g
        reservations:
          cpus: "1"
          memory: 2g
    pull_policy: if_not_present
    user: "101:101"
    env_file: .env
    environment:
      TZ: UTC
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
    ports:
      - "8123:8123"
      - "9350:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
      - ./config/clickhouse_dev.xml:/etc/clickhouse-server/config.d/dev_memory.xml:ro
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 1s
    networks:
      - langfuse

  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    init: true
    restart: always
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2g
        reservations:
          cpus: "1"
          memory: 1g
    pull_policy: if_not_present
    env_file: .env
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      TZ: UTC
    ports:
      - "127.0.0.1:9301:9000"
      - "127.0.0.1:9302:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - langfuse

  minio-init:
    image: quay.io/minio/mc:RELEASE.2025-08-13T08-35-41Z
    restart: on-failure
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/langfuse;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    networks:
      - langfuse

  redis:
    image: docker.io/redis:7-alpine
    init: true
    restart: always
    logging: *default-logging
    deploy: *deploy-limits
    pull_policy: if_not_present
    env_file: .env
    command: >
      --maxmemory-policy noeviction
      --appendonly yes
      --appendfsync everysec
      --tcp-keepalive 60
      --timeout 0
      --requirepass ${REDIS_PASSWORD}
    environment:
      TZ: UTC
    # ports no longer needed - redis accessed internally only
    # ports:
    #   - "6301:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"${REDIS_PASSWORD}\" ping | grep -q PONG"]
      interval: 3s
      timeout: 10s
      retries: 10
    networks:
      - langfuse

  ollama:
    build:
      context: .
      dockerfile: Dockerfile.ollama
    init: true
    restart: always
    logging: *default-logging
    deploy: *deploy-ollama
    pull_policy: if_not_present
    env_file: .env
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./scripts/ollama_entrypoint.sh:/ollama_entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/ollama_entrypoint.sh"]
    environment:
      TZ: UTC
      OLLAMA_KEEP_ALIVE: "24h"
      OLLAMA_WARMUP_MODELS: ""
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - langfuse

  litellm:
    build:
      context: .
      dockerfile: Dockerfile.litellm
    init: true
    restart: always
    logging: *default-logging
    deploy: *deploy-limits
    pull_policy: if_not_present
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
      - ./guardrails/custom_guardrails.py:/app/custom_guardrails.py
      - ./guardrails/semantic_cache.py:/app/semantic_cache.py
      - ./runtime_config.json:/app/runtime_config.json
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file: .env
    environment:
      LANGFUSE_HOST: http://langfuse-web:3000
      TZ: UTC
      PYTHONPATH: /app
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_ADMIN_KEY: ${LITELLM_ADMIN_KEY}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/litellm
      STORE_MODEL_IN_DB: "True"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      # disable prisma migrations on restart
      DISABLE_SCHEMA_UPDATE: "True"
      # Semantic injection second pass (LLM-judge classifier)
      SEMANTIC_GUARD_ENABLED: "${SEMANTIC_GUARD_ENABLED}"
      SEMANTIC_GUARD_MODEL: "${SEMANTIC_GUARD_MODEL}"
      SEMANTIC_GUARD_TIMEOUT: "${SEMANTIC_GUARD_TIMEOUT}"
      SEMANTIC_GUARD_PROXY_URL: "http://localhost:4000"
      # Toxicity detection (LLM-judge classifier)
      TOXICITY_GUARD_ENABLED: "${TOXICITY_GUARD_ENABLED}"
      TOXICITY_GUARD_MODEL: "${TOXICITY_GUARD_MODEL}"
      TOXICITY_GUARD_TIMEOUT: "${TOXICITY_GUARD_TIMEOUT}"
      TOXICITY_GUARD_PROXY_URL: "http://localhost:4000"
      # Semantic cache (Qdrant vectors + Redis responses)
      SEMANTIC_CACHE_ENABLED: "${SEMANTIC_CACHE_ENABLED}"
      SEMANTIC_CACHE_THRESHOLD: "${SEMANTIC_CACHE_THRESHOLD}"
      SEMANTIC_CACHE_COLLECTION: "${SEMANTIC_CACHE_COLLECTION}"
      SEMANTIC_CACHE_TTL: "${SEMANTIC_CACHE_TTL}"
      OLLAMA_URL: "http://ollama:11434"
      QDRANT_URL: "http://qdrant:6333"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      ARIZE_SPACE_KEY: ${ARIZE_SPACE_KEY}
      ARIZE_API_KEY: ${ARIZE_API_KEY}
      ARIZE_PROJECT_NAME: ${ARIZE_PROJECT_NAME}
      ARIZE_HTTP_ENDPOINT: "https://otlp.eu-west-1a.arize.com/v1"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness', timeout=4)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - langfuse

  litellm-init:
    image: python:3.13-slim
    restart: on-failure
    env_file: .env
    depends_on:
      litellm:
        condition: service_healthy
    volumes:
      - ./scripts/init_litellm.py:/init_litellm.py:ro
    command: >
      sh -c "pip install requests psycopg2-binary -q && python /init_litellm.py"
    environment:
      LITELLM_URL: http://litellm:4000
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_ADMIN_KEY: ${LITELLM_ADMIN_KEY}
      TZ: UTC
    networks:
      - langfuse

  rag-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    init: true
    restart: always
    logging: *default-logging
    deploy: *deploy-limits
    pull_policy: if_not_present
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
      - ./guardrails:/app/guardrails
      - ./runtime_config.json:/app/runtime_config.json
    env_file: .env
    environment:
      LITELLM_BASE_URL: http://litellm:4000
      QDRANT_URL: http://qdrant:6333
      LANGFUSE_BASE_URL: http://langfuse-web:3000
      OTEL_ENDPOINT: http://otel-collector:4318/v1/traces
      GITHUB_MCP_URL: http://github-mcp:8080/mcp
      TZ: UTC
    ports:
      - "8001:8001"
    depends_on:
      litellm:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=4)"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - langfuse

  openwebui:
    image: ghcr.io/open-webui/open-webui@sha256:74093dadc9c6aabc23987a74fd8c2fb8d995b1a5b22e83b0036fb9d6af590e8c
    init: true
    restart: always
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1.5g
        reservations:
          cpus: "1"
          memory: 1g
    pull_policy: if_not_present
    ports:
      - "3100:8080"
    volumes:
      - openwebui_data:/app/backend/data
    environment:
      ENABLE_OLLAMA_API: "false"
      OPENAI_API_BASE_URLS: "http://rag-api:8001/v1;http://litellm:4000/v1"
      OPENAI_API_KEYS: "${LITELLM_MASTER_KEY};${LITELLM_MASTER_KEY}"
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY}
      DEFAULT_MODELS: "agentguard-rag"
      # Prevent Open WebUI downloading sentence-transformer models from HF on startup.
      # We use our own RAG chain, so point its embedding engine at LiteLLM instead.
      RAG_EMBEDDING_ENGINE: "openai"
      RAG_OPENAI_API_BASE_URL: "http://litellm:4000/v1"
      RAG_OPENAI_API_KEY: ${LITELLM_MASTER_KEY}
      RAG_EMBEDDING_MODEL: "nomic-embed-text"
      # Open WebUI rephrases each message into a separate search query and embeds
      # it independently of our app's RAG/agent pipeline. Disable — we do our own retrieval.
      ENABLE_RETRIEVAL_QUERY_GENERATION: "false"
      TZ: UTC
    depends_on:
      rag-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/version"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - langfuse

  agentguard-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    init: true
    restart: always
    logging: *default-logging
    deploy: *deploy-limits
    pull_policy: if_not_present
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
    env_file: .env
    environment:
      LANGFUSE_BASE_URL: http://langfuse-web:3000
      LITELLM_BASE_URL: http://litellm:4000
      QDRANT_URL: http://qdrant:6333
      OPENWEBUI_BASE_URL: http://openwebui:8080
      PYTHONUNBUFFERED: "1"
      TZ: UTC
    depends_on:
      langfuse-web:
        condition: service_healthy
      openwebui:
        condition: service_healthy
    networks:
      - langfuse

  qdrant:
    image: qdrant/qdrant:v1.18.0
    init: true
    restart: always
    logging: *default-logging
    deploy: *deploy-limits
    pull_policy: if_not_present
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      TZ: UTC
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/6333' 2>/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - langfuse

  openobserve:
    image: public.ecr.aws/zinclabs/openobserve:latest
    restart: unless-stopped
    logging: *default-logging
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 1.5g
        reservations:
          cpus: "1"
          memory: 1g
    pull_policy: if_not_present
    ports:
      - "5080:5080"
    volumes:
      - openobserve_data:/data
    environment:
      ZO_DATA_DIR: /data
      ZO_ROOT_USER_EMAIL: "${ZO_ROOT_USER_EMAIL}"
      ZO_ROOT_USER_PASSWORD: "${ZO_ROOT_USER_PASSWORD}"
      TZ: UTC
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - langfuse

  github-mcp:
    image: ghcr.io/github/github-mcp-server:latest
    restart: unless-stopped
    logging: *default-logging
    pull_policy: if_not_present
    command: ["http", "--port", "8080", "--toolsets", "issues,repos,search,git"]
    ports:
      - "127.0.0.1:8091:8080"
    environment:
      GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_PERSONAL_ACCESS_TOKEN}"
      TZ: UTC
    networks:
      - langfuse
    profiles:
      - mcp

  traefik:
    image: traefik:v3.7.5
    restart: always
    logging: *default-logging
    deploy: *deploy-limits
    pull_policy: if_not_present
    command:
      - "--api.dashboard=true"
      - "--entrypoints.web.address=:80"
      - "--providers.file.filename=/etc/traefik/routes.yml"
      - "--providers.file.watch=true"
      - "--log.level=INFO"
    ports:
      - "80:80"
    volumes:
      - ./traefik-routes.yml:/etc/traefik/routes.yml:ro
    environment:
      TZ: UTC
    networks:
      - langfuse

  authelia:
    image: authelia/authelia:4.37.5
    restart: always
    logging: *default-logging
    volumes:
      - ./authelia/configuration.yml:/config/configuration.yml:ro
      - ./authelia/users_database.yml:/config/users_database.yml:ro
      - authelia_data:/config/data
    environment:
      TZ: UTC
      AUTHELIA_JWT_SECRET: ${AUTHELIA_JWT_SECRET}
      AUTHELIA_SESSION_SECRET: ${AUTHELIA_SESSION_SECRET}
      AUTHELIA_SESSION_REDIS_PASSWORD: ${REDIS_PASSWORD}
      AUTHELIA_STORAGE_ENCRYPTION_KEY: ${AUTHELIA_STORAGE_ENCRYPTION_KEY}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9091/api/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - langfuse

volumes:
  postgres_data:
  clickhouse_data:
  clickhouse_logs:
  minio_data:
  redis_data:
  ollama_data:
  qdrant_data:
  openwebui_data:
  openobserve_data:
  authelia_data:

networks:
  langfuse:
    driver: bridge
