x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "2"

x-deploy-limits: &deploy-limits
  resources:
    limits:
      cpus: "1"
      memory: 1g
    reservations:
      cpus: "0.5"
      memory: 512m

x-deploy-clickhouse: &deploy-clickhouse
  resources:
    limits:
      cpus: "2"
      memory: 2g
    reservations:
      cpus: "1"
      memory: 1g

x-deploy-postgres: &deploy-postgres
  resources:
    limits:
      cpus: "1.5"
      memory: 1g
    reservations:
      cpus: "1"
      memory: 512m

x-deploy-ollama: &deploy-ollama
  resources:
    limits:
      cpus: "4"
      memory: 12g
    reservations:
      cpus: "2"
      memory: 10g
      devices:
        - driver: nvidia
          count: all
          capabilities: [gpu]

x-deploy-otel: &deploy-otel
  resources:
    limits:
      cpus: "0.5"
      memory: 256m
    reservations:
      cpus: "0.25"
      memory: 128m

x-deploy-jaeger: &deploy-jaeger
  resources:
    limits:
      cpus: "0.5"
      memory: 512m
    reservations:
      cpus: "0.25"
      memory: 256m

services:
  langfuse-web:
    image: docker.io/langfuse/langfuse:3.174.1
    restart: always
    logging: *default-logging
    deploy: *deploy-limits
    pull_policy: if_not_present
    env_file: .env
    depends_on: &langfuse-deps
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://$(hostname -i):3000/api/public/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    environment: &langfuse-env
      TZ: UTC
      NEXTAUTH_URL: http://localhost:3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
      TELEMETRY_ENABLED: "false"
      LANGFUSE_ENABLE_EXPERIMENTAL_FEATURES: "false"
      CLICKHOUSE_MIGRATION_URL: clickhouse://clickhouse:9000
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: clickhouse
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: auto
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_EVENT_UPLOAD_PREFIX: events/
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: auto
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_PREFIX: media/
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      LANGFUSE_S3_BATCH_EXPORT_ENABLED: "false"
      LANGFUSE_USE_AZURE_BLOB: "false"
      LANGFUSE_USE_OCI_NATIVE_OBJECT_STORAGE: "false"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_AUTH: ${REDIS_PASSWORD:-redissecret}
      REDIS_TLS_ENABLED: "false"
      LANGFUSE_INIT_ORG_ID: ${LANGFUSE_INIT_ORG_ID:-my-org}
      LANGFUSE_INIT_ORG_NAME: ${LANGFUSE_INIT_ORG_NAME:-My Org}
      LANGFUSE_INIT_PROJECT_ID: ${LANGFUSE_INIT_PROJECT_ID:-my-project}
      LANGFUSE_INIT_PROJECT_NAME: ${LANGFUSE_INIT_PROJECT_NAME:-AgentGuard}
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-pk-lf-dev}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-sk-lf-dev}
      LANGFUSE_INIT_USER_EMAIL: ${LANGFUSE_INIT_USER_EMAIL:-admin@local.dev}
      LANGFUSE_INIT_USER_NAME: ${LANGFUSE_INIT_USER_NAME:-Admin}
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD:-admin123456}
    networks:
      - langfuse

  langfuse-worker:
    image: docker.io/langfuse/langfuse-worker:3.174.1
    restart: always
    logging: *default-logging
    deploy: *deploy-limits
    pull_policy: if_not_present
    env_file: .env
    depends_on: *langfuse-deps
    environment:
      <<: *langfuse-env
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://$(hostname -i):3030/api/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - langfuse

  postgres:
    image: docker.io/postgres:17-alpine
    restart: always
    logging: *default-logging
    deploy: *deploy-postgres
    pull_policy: if_not_present
    command: >
      postgres
      -c tcp_keepalives_idle=60
      -c tcp_keepalives_interval=10
      -c tcp_keepalives_count=5
      -c idle_in_transaction_session_timeout=30000
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    env_file: .env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
      TZ: UTC
      PGTZ: UTC
    ports:
      - "127.0.0.1:5500:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 3s
      retries: 10
    networks:
      - langfuse

  clickhouse:
    image: docker.io/clickhouse/clickhouse-server:26.4
    restart: always
    logging: *default-logging
    deploy: *deploy-clickhouse
    pull_policy: if_not_present
    user: "101:101"
    env_file: .env
    environment:
      TZ: UTC
      CLICKHOUSE_DB: default
      CLICKHOUSE_USER: clickhouse
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 1s
    networks:
      - langfuse

  minio:
    image: quay.io/minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: always
    logging: *default-logging
    deploy: *deploy-limits
    pull_policy: if_not_present
    env_file: .env
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      TZ: UTC
    ports:
      - "127.0.0.1:9090:9000"
      - "127.0.0.1:9091:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - langfuse

  minio-init:
    image: quay.io/minio/mc:RELEASE.2025-08-13T08-35-41Z
    restart: on-failure
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb --ignore-existing local/langfuse;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    networks:
      - langfuse

  redis:
    image: docker.io/redis:7-alpine
    restart: always
    logging: *default-logging
    deploy: *deploy-limits
    pull_policy: if_not_present
    env_file: .env
    command: >
      --maxmemory-policy noeviction
      --appendonly yes
      --appendfsync everysec
      --tcp-keepalive 60
      --timeout 0
      --requirepass ${REDIS_PASSWORD:-redissecret}
    environment:
      TZ: UTC
    ports:
      - "127.0.0.1:6300:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 10s
      retries: 10
    networks:
      - langfuse

  ollama:
    image: ollama/ollama:0.20.7
    restart: always
    logging: *default-logging
    deploy: *deploy-ollama
    pull_policy: if_not_present
    env_file: .env
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./scripts/ollama_entrypoint.sh:/ollama_entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/ollama_entrypoint.sh"]
    environment:
      TZ: UTC
      OLLAMA_KEEP_ALIVE: "24h"
      OLLAMA_WARMUP_MODELS: ""
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - langfuse

  litellm:
    image: ghcr.io/berriai/litellm:main-v1.82.3
    restart: always
    logging: *default-logging
    deploy: *deploy-limits
    pull_policy: if_not_present
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "4000:4000"
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
      - ./guardrails/custom_guardrails.py:/app/custom_guardrails.py
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    env_file: .env
    environment:
      LANGFUSE_HOST: http://langfuse-web:3000
      TZ: UTC
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_ADMIN_KEY: ${LITELLM_ADMIN_KEY}
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/litellm
      STORE_MODEL_IN_DB: "True"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redissecret}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness', timeout=4)"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - langfuse

  litellm-init:
    image: python:3.11-slim
    restart: on-failure
    env_file: .env
    depends_on:
      litellm:
        condition: service_healthy
    volumes:
      - ./scripts/init_litellm.py:/init_litellm.py:ro
    command: >
      sh -c "pip install requests psycopg2-binary -q && python /init_litellm.py"
    environment:
      LITELLM_URL: http://litellm:4000
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY}
      LITELLM_ADMIN_KEY: ${LITELLM_ADMIN_KEY}
      TZ: UTC
    networks:
      - langfuse

  rag-api:
    image: python:3.11-slim
    restart: always
    logging: *default-logging
    deploy: *deploy-limits
    pull_policy: if_not_present
    working_dir: /workspace
    volumes:
      - .:/workspace
      - pip_cache:/root/.cache/pip
    command: >
      sh -c "pip install -r requirements.txt -q --cache-dir /root/.cache/pip &&
             uvicorn app.api:app --host 0.0.0.0 --port 8001"
    env_file: .env
    environment:
      LITELLM_BASE_URL: http://litellm:4000
      QDRANT_URL: http://qdrant:6333
      LANGFUSE_BASE_URL: http://langfuse-web:3000
      OTEL_ENDPOINT: http://otel-collector:4318/v1/traces
      TZ: UTC
    ports:
      - "8001:8001"
    depends_on:
      litellm:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=4)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 120s
    networks:
      - langfuse

  openwebui:
    image: ghcr.io/open-webui/open-webui@sha256:74093dadc9c6aabc23987a74fd8c2fb8d995b1a5b22e83b0036fb9d6af590e8c
    restart: always
    logging: *default-logging
    deploy: *deploy-limits
    pull_policy: if_not_present
    ports:
      - "3001:8080"
    volumes:
      - openwebui_data:/app/backend/data
    environment:
      ENABLE_OLLAMA_API: "false"
      OPENAI_API_BASE_URLS: "http://rag-api:8001/v1"
      OPENAI_API_KEYS: ${LITELLM_MASTER_KEY:-sk-litellm-dev-key}
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY:-agentguard-secret-key}
      DEFAULT_MODELS: "agentguard-rag"
      # Prevent Open WebUI downloading sentence-transformer models from HF on startup.
      # We use our own RAG chain, so point its embedding engine at LiteLLM instead.
      RAG_EMBEDDING_ENGINE: "openai"
      RAG_OPENAI_API_BASE_URL: "http://litellm:4000/v1"
      RAG_OPENAI_API_KEY: ${LITELLM_MASTER_KEY:-sk-litellm-dev-key}
      RAG_EMBEDDING_MODEL: "nomic-embed-text"
      TZ: UTC
    depends_on:
      rag-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - langfuse

  agentguard-worker:
    image: python:3.11-slim
    restart: always
    logging: *default-logging
    deploy: *deploy-limits
    pull_policy: if_not_present
    working_dir: /workspace
    volumes:
      - .:/workspace
      - pip_cache:/root/.cache/pip
    command: >
      sh -c "pip install -r requirements.txt -q --cache-dir /root/.cache/pip &&
             python -m scripts.worker"
    env_file: .env
    environment:
      LANGFUSE_BASE_URL: http://langfuse-web:3000
      LITELLM_BASE_URL: http://litellm:4000
      QDRANT_URL: http://qdrant:6333
      OPENWEBUI_BASE_URL: http://openwebui:8080
      PYTHONUNBUFFERED: "1"
      TZ: UTC
    depends_on:
      langfuse-web:
        condition: service_healthy
      openwebui:
        condition: service_healthy
    networks:
      - langfuse

  portainer:
    image: portainer/portainer-ce@sha256:8d2f5c9fbc5b8490fb3a12efadbad74978e22991911e1db611d8a45871775112
    restart: always
    logging: *default-logging
    deploy: *deploy-limits
    pull_policy: if_not_present
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer_data:/data
    environment:
      TZ: UTC
    networks:
      - langfuse

  dozzle:
    image: amir20/dozzle:v10.6.0
    restart: always
    logging: *default-logging
    deploy: *deploy-limits
    pull_policy: if_not_present
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      DOZZLE_NO_ANALYTICS: "true"
      TZ: UTC
    networks:
      - langfuse

  qdrant:
    image: qdrant/qdrant:v1.18.0
    restart: always
    logging: *default-logging
    deploy: *deploy-limits
    pull_policy: if_not_present
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      TZ: UTC
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/6333' 2>/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - langfuse

  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    restart: always
    logging: *default-logging
    deploy: *deploy-jaeger
    pull_policy: if_not_present
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      TZ: UTC
    ports:
      - "16686:16686"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - langfuse

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    restart: always
    logging: *default-logging
    deploy: *deploy-otel
    pull_policy: if_not_present
    volumes:
      - ./otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    environment:
      LANGFUSE_OTEL_AUTH: "${LANGFUSE_OTEL_AUTH:-Basic cGstbGYtZGV2OnNrLWxmLWRldg==}"
      TZ: UTC
    ports:
      - "4317:4317"
      - "4318:4318"
      - "13133:13133"
    depends_on:
      langfuse-web:
        condition: service_healthy
      jaeger:
        condition: service_started
    networks:
      - langfuse

volumes:
  postgres_data:
  clickhouse_data:
  clickhouse_logs:
  minio_data:
  redis_data:
  ollama_data:
  qdrant_data:
  portainer_data:
  pip_cache:
  openwebui_data:

networks:
  langfuse:
    driver: bridge
