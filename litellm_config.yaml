model_list:
  # ── Embedding (local Ollama — only model served locally) ─────────────
  - model_name: nomic-embed-text
    litellm_params:
      model: ollama/nomic-embed-text
      api_base: http://ollama:11434

  # ── Chat models (OpenRouter) ─────────────────────────────────────────
  - model_name: openrouter-gemini-flash
    litellm_params:
      model: openai/google/gemini-2.5-flash-lite
      api_base: https://openrouter.ai/api/v1
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: openrouter-mistral
    litellm_params:
      model: openai/mistralai/mistral-nemo
      api_base: https://openrouter.ai/api/v1
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: openrouter-claude-haiku
    litellm_params:
      model: openai/anthropic/claude-haiku-4-5
      api_base: https://openrouter.ai/api/v1
      api_key: os.environ/OPENROUTER_API_KEY

litellm_settings:
  drop_params: true
  num_retries: 3
  fallbacks: [{"openrouter-mistral": ["openrouter-gemini-flash"]}]
  success_callback: ["langfuse", "arize"]
  failure_callback: ["langfuse", "arize"]
  callbacks: ["semantic_cache.SemanticCacheActivator", "prometheus"]

guardrails:
  - guardrail_name: "prompt-injection"
    litellm_params:
      guardrail: custom_guardrails.PromptInjectionGuard
      mode: "pre_call"
      default_on: true
  - guardrail_name: "pii-masking"
    litellm_params:
      guardrail: custom_guardrails.PIIMaskingGuard
      mode: "post_call"
      default_on: true
  - guardrail_name: "toxicity"
    litellm_params:
      guardrail: custom_guardrails.ToxicityGuard
      mode: "pre_call"
      default_on: true

general_settings:
  master_key: sk-litellm-dev-key
  public_routes:
    - "/model_group/info"
    - "/health/liveliness"
    - "/health/readiness"
  user_header_mappings:
    - header_name: X-OpenWebUI-User-Id
      litellm_user_role: internal_user
    - header_name: X-OpenWebUI-User-Email
      litellm_user_role: customer