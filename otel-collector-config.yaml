receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 512
  resource:
    attributes:
      - action: upsert
        key: service.name
        value: agentguard

exporters:
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  otlphttp/langfuse:
    # Langfuse v3 OTel ingestion endpoint; collector appends /v1/traces.
    endpoint: http://langfuse-web:3000/api/public/otel
    headers:
      Authorization: "${env:LANGFUSE_OTEL_AUTH}"

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlp/jaeger, otlphttp/langfuse]
