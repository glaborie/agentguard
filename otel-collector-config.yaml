extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 512
  resource:
    attributes:
      - action: upsert
        key: service.name
        value: agentguard

exporters:
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true
  otlphttp/langfuse:
    # Langfuse v3 OTel ingestion endpoint; collector appends /v1/traces.
    endpoint: http://langfuse-web:3000/api/public/otel
    headers:
      Authorization: "${env:LANGFUSE_OTEL_AUTH}"
  otlphttp/openobserve:
    # OpenObserve OTLP HTTP ingestion — runs on host at port 5080.
    endpoint: "${env:OPENOBSERVE_OTLP_ENDPOINT}"
    headers:
      Authorization: "${env:OPENOBSERVE_AUTH}"

service:
  telemetry:
    metrics:
      address: 0.0.0.0:8888
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resource, batch]
      exporters: [otlp/jaeger, otlphttp/langfuse, otlphttp/openobserve]
